<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVTUBE</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#fff;
}

header{
  text-align:center;
  padding:10px;
  font-weight:bold;
  letter-spacing:1px;
}

video{
  width:100%;
  height:65vh;
  background:#000;
  object-fit:cover;
}

.info{
  text-align:center;
  font-size:13px;
  opacity:0.85;
  padding:6px;
}

.controls{
  display:flex;
  gap:6px;
  padding:6px;
}

.btn{
  flex:1;
  background:#fff;
  color:#000;
  text-align:center;
  padding:12px;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  padding:10px;
}

.card{
  background:#111;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
}

.card video{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-title{
  font-size:11px;
  padding:6px;
  opacity:0.9;
}

.loadmore{
  text-align:center;
  padding:12px;
  background:#111;
  margin:10px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>AVTUBE</header>

<video id="player" controls></video>

<div class="info" id="info">Klik PLAY untuk mulai</div>

<div class="controls">
  <div class="btn" onclick="startVideo()">▶ PLAY</div>
  <div class="btn" onclick="nextVideo()">⏭ NEXT</div>
</div>

<div class="grid" id="grid"></div>
<div class="loadmore" onclick="loadMore()">Load More</div>

<script>
let data = [];
let index = 0;
let renderLimit = 8;

// LOAD DATA
fetch('videos.json?v=' + Date.now())
.then(r => r.json())
.then(res => {
  data = res;

  data.sort((a,b)=>
    a.series.localeCompare(b.series) || a.id - b.id
  );

  let last = localStorage.getItem("lastVideo");
  if(last !== null) index = parseInt(last);

  render();
  load();
});

// PLAY START
function startVideo(){
  load();
}

// LOAD VIDEO
function load(){
  if(!data.length) return;

  let v = data[index];
  player.src = v.file;

  document.getElementById("info").innerText =
    `Series ${v.series} • ${v.title}`;

  localStorage.setItem("lastVideo", index);
}

// NEXT LOGIC
function getNext(){
  let series = data[index].series;

  let next = data.findIndex((v,i)=>
    i > index && v.series === series
  );

  if(next === -1){
    next = index + 1;
    if(next >= data.length) next = 0;
  }

  return next;
}

function nextVideo(){
  index = getNext();
  load();
}

// GRID
function render(){
  let html = "";

  let slice = data.slice(0, renderLimit);

  slice.forEach((v,i)=>{
    html += `
      <div class="card" onclick="go(${i})">
        <video src="${v.file}" muted></video>
        <div class="card-title">${v.title}</div>
      </div>
    `;
  });

  grid.innerHTML = html;
}

function loadMore(){
  renderLimit += 8;
  render();
}

function go(i){
  index = i;
  load();
}

// SAVE LAST WATCH
window.addEventListener("beforeunload",()=>{
  localStorage.setItem("lastVideo", index);
});
</script>
