<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>avtube</title>

<style>
body{margin:0;background:#000;font-family:Arial}

/* HEADER */
.header{
  text-align:center;
  color:#fff;
  padding:10px;
  font-weight:bold;
}

/* PLAYER */
video{
  width:100%;
  height:60vh;
  object-fit:cover;
}

/* NEXT BUTTON */
.next-btn{
  background:#fff;
  color:#000;
  padding:10px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}

/* REKOMENDASI */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:10px;
}

.item video{
  width:100%;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">avtube</div>

<!-- POPUNDER -->
<script>
(function(s){
  s.dataset.zone='10908808',
  s.src='https://al5sm.com/tag.min.js'
})
([document.documentElement, document.body].pop().appendChild(document.createElement('script')));
</script>

<video id="player" controls></video>

<div class="next-btn" onclick="nextVideo()">▶ Video Berikutnya</div>

<div class="grid" id="list"></div>

<script>
let videos=[];
let currentIndex=0;
let triggered=false;

// ambil id
let id=new URLSearchParams(location.search).get("id");

// load data
fetch('videos.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  videos=data.sort(()=>Math.random()-0.5);

  currentIndex = videos.findIndex(v=>v.id==id);
  if(currentIndex < 0) currentIndex = 0;

  loadVideo();
  renderList();
});

// load video
function loadVideo(){
  player.src = videos[currentIndex].file;
}

// NEXT VIDEO
function nextVideo(){
  currentIndex++;
  if(currentIndex >= videos.length) currentIndex = 0;
  loadVideo();
  player.play();
}

// AUTO NEXT
player.addEventListener("ended", ()=>{
  nextVideo();
});

// IKLAN HALUS (sekali saja)
player.addEventListener("timeupdate", ()=>{
  if(!triggered && player.currentTime > 5){
    triggered=true;
    document.body.click();
  }
});

// render rekomendasi
function renderList(){
  let html="";
  videos.slice(0,20).forEach((v,i)=>{
    html+=`
    <div class="item" onclick="goVideo(${i})">
      <video src="${v.file}"></video>
    </div>`;
  });
  list.innerHTML=html;
}

// klik rekomendasi
function goVideo(i){
  currentIndex=i;
  loadVideo();
  player.play();
}
</script>

</body>
</html>
